name: Release

# Builds native installers on GitHub's runners and attaches them to the Release.
#
#   - Publish a GitHub Release (tag like `v0.1.0`) → installers are built and
#     uploaded as assets on that release.
#   - Or run manually from the Actions tab (workflow_dispatch) → installers are
#     produced as downloadable workflow artifacts (no release needed).
#
# Tip: keep the tag in sync with `version` in src-tauri/tauri.conf.json so the
# bundle filenames match the release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # needed to upload assets onto the release

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest # → .msi (WiX) + .exe (NSIS); registers the .xml handler
            args: ""
          - platform: ubuntu-22.04 # → .deb + .AppImage (22.04 for broad glibc compat)
            args: ""
          - platform: macos-latest # → .dmg (unsigned; Gatekeeper will warn)
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build the app + installers
        run: bun tauri build ${{ matrix.args }}

      # Always expose the installers as workflow artifacts (works for
      # workflow_dispatch runs too, where there is no release to attach to).
      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubl-viewer-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg

      # On a published Release, attach the installers as release assets.
      - name: Attach installers to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
